	<h1 class="fw-33 centrar-texto">Contactanos</h1>
	<img src="../img/destacada3.jpg" alt="imagen Principal">

	<main class="contenedor section contenido-centrado">
		<h2 class="fw-33 centrar-texto">Llena el formulario de contacto</h2>

		<form action="">
			<fieldset>
				<legend>Informacion Personal</legend>
				<label for="nombre">Nombre:</label>
				<input type="text" id="nombre" placeholder="Nombre" required>

				<label for="email">E-mail:</label>
				<input type="email" id="email" placeholder="correo electronico" required>

				<label for="telefono">telefono</label>
				<input type="tel" id="telefono" placeholder="numero telefonico" required>

				<label for="mensaje">Mensaje:</label>
				<textarea name="mensaje" id="mensaje">Escribe un mensaje</textarea>
			</fieldset>
		
			<fieldset>
				<legend>Informacion sobre la propiedad</legend>
				<label for="opciones">Vende o Compra</label>
				<select name="" id="opciones">
					<option value="" disabled selected>--seleccione---</option>
					<option value="vende">vende</option>
					<option value="compra">compra</option>
				</select>

				<label for="cantidad">Cantidad</label>
				<input type="number" min="0"  max="10" step="5">
			</fieldset>

			<fieldset>
				<legend>Contacto</legend>

				<p>Como desea ser contactado:</p>

				<div class="forma-contacto">
					<label for="telefono">Telefono</label>
					<input type="radio" name="contacto" value="telefono" id="telefono">
				
					<label for="correo">E-mail</label>
					<input type="radio" name="contacto" value="correo" id="correo">
				</div>

				<p>Si eligio Telefono, elija la fecha y la hora</p>
				<label for="fecha">Fecha:</label>
				<input type="date" id="fecha">
				<label for="hora">Hora:</label>
				<input type="time" id="hora">
			</fieldset>
			
			<input type="submit" value="Enviar" class="boton boton-verde">

		</form>
	</main>
